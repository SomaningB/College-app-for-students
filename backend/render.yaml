services:
  - type: web
    name: college-app-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: college_app
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: BREVO_API_KEY
        sync: false
      - key: APP_URL
        value: https://frontend-o04470abe-somaningbs-projects.vercel.app
      - key: FROM_EMAIL
        value: somubelagaonkar@gmail.com
      - key: FROM_NAME
        value: "College App"
